<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rafaella Vitoria</title>
</head>
<body>
     <header>
            <div class="interface"> 
                <div class="logo">
                    <a href="#">
                        <img src="images/logo.png" alt="Logo do portfólio">
                    </a>
                </div><!-- Fechando logo -->
                
                <!-- menu desktop -->
                <nav class="menu-desktop">
                    <ul>
                        <li><a href="#">Ínicio</a></li>
                        <li><a href="#">Especialidades</a></li>
                        <li><a href="#">Sobre</a></li>
                        <li><a href="#">Projetos</a></li>
                    </ul>
                </nav> <!-- fechando nav -->

                <!-- botão de contato -->
                <div class="btn-contato">
                    <a href="#">
                        <button>Contato</button>
                    </a>
                </div> <!-- fechando botão de contato -->
            </div> <!-- fechando interface -->
        </header>

        <main> 
            <section class="topo-do-site">
                <div class="interface">
                    <div class="flex"> <!-- classe flex -->
                        <div class="txt-topo-site">
                            <h1>
                                Texto legal para o topo do site
                            </h1>
                            <p>
                                textotextotextotextotextotextotextotextotextotextotextotextotextotextotextotextotextotexto
                            </p>
                            <div class="btn-contato">
                                <a href="#">
                                    <button>Entre em contato</button>
                                </a>
                            </div>
                        </div>
                        <div class="img-topo-site">
                            <h1>
                                <img src="images/fotominha.png" alt="Imagem do topo do site">
                            </h1>
                        </div>
                    </div> <!-- fechando flex -->
                </div> <!-- fechando class interface -->
            </section>
        </main>
</body>
</html>
