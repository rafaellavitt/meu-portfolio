<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- fontes do Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,700;1,100;1,200;1,300;1,700&display=swap" rel="stylesheet">
    <!-- fim Google Fonts -->
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- fim Bootstrap Icons -->
    <link rel="stylesheet" href="style.css">
    <title>Rafaella Vitoria</title>
</head>
<body>
     <header>
            <div class="interface"> 
                <div class="logo">
                    <a href="#">
                        <img src="images/logo.png" alt="Logo do portfólio">
                    </a>
                </div><!-- Fechando logo -->
                
                <!-- menu desktop -->
                <nav class="menu-desktop">
                    <ul>
                        <li><a href="#topo-do-site">Ínicio</a></li>
                        <li><a href="#especialidades">Especialidades</a></li>
                        <li><a href="#">Sobre</a></li>
                        <li><a href="#">Projetos</a></li>
                    </ul>
                </nav> <!-- fechando nav -->

                <!-- botão de contato -->
                <div class="btn-contato">
                    <a href="#">
                        <button>Contato</button>
                    </a>
                </div> <!-- fechando botão de contato -->
            </div> <!-- fechando interface -->
        </header>

        <main>
            <!-- section topo do site -->
            <section class="topo-do-site" id="topo-do-site">
                <div class="interface">
                    <div class="flex">
                        <div class="txt-topo-site">
                            <h1>
                                Texto legal para o topo do site
                            </h1>
                            <p>
                                textotextotextotextotextotextotextotextotextotextotextotextotextotextotextotextotextotexto
                            </p>
                            <div class="btn-contato">
                                <a href="#">
                                    <button>Entre em contato</button>
                                </a>
                            </div>
                        </div>
                        <div class="img-topo-site">
                            <h1>
                                <img src="images/fotominha.png" alt="Imagem do topo do site">
                            </h1>
                        </div>
                    </div> <!-- fechando flex -->
                </div> <!-- fechando interface -->
            </section> <!-- fechando topo do site -->
            <!-- section especialidades -->
            <section class="especialidades" id="especialidades">
            <div class="interface">
                <h2 class="titulo">MINHAS ESPECIALIDADES</h2>
                <div class="flex">
                    <div class="esp-box"> <!-- box html -->
                        <i class="bi bi-filetype-html"></i>
                            <h3>HTML</h3>
                    </div> <!-- fechando esp-box -->
                                        <div class="esp-box"> 
                        <i class="bi bi-css"></i>
                            <h3>CSS</h3>
                    </div> <!-- fechando esp-box -->
                                        <div class="esp-box"> 
                        <i class="bi bi-filetype-js"></i>
                            <h3>JavaScript</h3>                            
                    </div> <!-- fechando esp-box -->
                </div> <!-- fechando flex -->
            </div> <!-- fechando interface -->
            </section> <!-- fechando especialidades -->
        </main>
</body>
</html>
